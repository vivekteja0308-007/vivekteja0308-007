name: generate snake game
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: vivekteja0308-007
          outputs: |
            dist/github-snake.svg?color_snake=%232EE6D6&color_dots=%23161B22,%230E4429,%23006D32,%2326A641,%2339D353&color_background=%23ffffff
            dist/github-snake-dark.svg?color_snake=%232EE6D6&color_dots=%23161B22,%230E4429,%23006D32,%2326A641,%2339D353&color_background=%230D1117
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
